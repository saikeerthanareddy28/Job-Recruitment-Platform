spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jobportal}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:JobPortalDefaultSecretKey_ChangeInProduction_32chars!}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${REFRESH_TOKEN_EXPIRATION:604800000}
  upload:
    directory: ${UPLOAD_DIRECTORY:./uploads}
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    com.jobportal: INFO
    org.springframework.security: WARN
